version: 2
updates:
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: daily
      time: "06:00"
      timezone: Europe/Rome
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: build
    groups:
      docker-dependencies:
        patterns:
          - "*"

  - package-ecosystem: pip
    directory: /
    schedule:
      interval: daily
      time: "06:15"
      timezone: Europe/Rome
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - python
    commit-message:
      prefix: deps
    groups:
      python-dependencies:
        patterns:
          - "*"
